<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body and Soul | Registro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700&family=Sansita:wght@700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/public-styles/login.css">
</head>
<body>

  <header class="main-header">
    <div class="container header-container">

      <div class="header-left">
        <a href="index.html" class="logo-link" aria-label="Ir al inicio">
          <img src="assets/logo-body-and-soul.png" class="logo" alt="Body and Soul">
        </a>

        <div class="nav-categories">
          <label for="categorias" class="sr-only">Categorías</label>
          <select id="categorias" class="categories-select">
            <option value="">Categorías</option>
            <option value="deporte">Deporte</option>
            <option value="bienestar">Bienestar</option>
          </select>
        </div>
      </div>

      <div class="header-title">
        <h1>Bienvenida a Body and Soul</h1>
      </div>

      <div class="header-right">
        <a href="login.html" class="btn btn-outline">Iniciar sesión</a>
      </div>

    </div>
  </header>

  <main class="login-page">
    <section class="login-section">
      <div class="container">
        <div class="login-wrapper">

          <div class="login-card">
            <div class="login-card-header">
              <span class="section-tag">Crea tu cuenta</span>
              <h2>Regístrate</h2>
            </div>

            <form action="#" method="post" class="login-form">
              <div class="form-group">
                <label for="nombre">Nombre</label>
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  placeholder="Introduce tu nombre"
                  required
                >
              </div>

              <div class="form-group">
                <label for="apellido">Apellido</label>
                <input
                  type="text"
                  id="apellido"
                  name="apellido"
                  placeholder="Introduce tu apellido"
                  required
                >
              </div>

              <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Introduce tu correo"
                  required
                >
              </div>

              <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Crea una contraseña"
                  required
                >
              </div>

              <div class="form-group">
                <label for="confirm-password">Confirmar contraseña</label>
                <input
                  type="password"
                  id="confirm-password"
                  name="confirm_password"
                  placeholder="Repite la contraseña"
                  required
                >
              </div>

              <button type="submit" class="btn btn-primary btn-full login-btn">
                Registrarme
              </button>
            </form>

            <p class="login-register-text">
              ¿Ya tienes cuenta?
              <a href="login.html" class="register-link">Inicia sesión</a>
            </p>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer class="main-footer">
    <div class="container footer-container">
      <div class="footer-brand">
        <p>&copy; 2026 Body and Soul. Todos los derechos reservados.</p>
      </div>

      <div class="footer-social">
        <a href="#" aria-label="Instagram" class="social-link">IG</a>
        <a href="#" aria-label="Facebook" class="social-link">f</a>
        <a href="#" aria-label="X" class="social-link">X</a>
      </div>
    </div>
  </footer>

</body>
</html>
